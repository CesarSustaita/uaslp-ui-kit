<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="/src/components/ui-pagination.js"></script>
    <script type="module" src="/src/components/ui-navigation-btn.js"></script>
    <script type="module" src="/src/main.js"></script>
    <title>UASLP UI Kit - Tab</title>
</head>
<body>
    <a href="/">Volver a la lista</a>

    <h1>Componentes Pagination</h1>

    <h3>Pagination</h3>

   
    <ui-pagination></ui-pagination>
    <br><br>
    <ui-pagination currentPage="1" totalPages="50"></ui-pagination>
    <br><br>
    <ui-pagination currentPage="20" totalPages="50"></ui-pagination>
    <br><br>
    <ui-pagination currentPage="1" totalPages="5"></ui-pagination>

    <br><br>

    <ui-navigation-btn type="previous">  </ui-navigation-btn>
    <ui-navigation-btn type="next"> </ui-navigation-btn>

    <br><br>

    <ui-navigation-btn type="previous" > Atras </ui-navigation-btn>
    <br>
    <ui-navigation-btn type="next" > Continuar </ui-navigation-btn>
    
    <br><br>

    <ui-navigation-btn type="previous" disabled> Atras </ui-navigation-btn>
    <br>
    <ui-navigation-btn type="next" disabled> Continuar </ui-navigation-btn>

    <br><br>

    <ui-navigation-btn type="previous" label="Atras"></ui-navigation-btn>
    <br>
    <ui-navigation-btn type="next" label="Siguiente" ></ui-navigation-btn>
    <ui-navigation-btn type="previous">  </ui-navigation-btn>
    <ui-navigation-btn type="next"> </ui-navigation-btn>


    <br><br>

    <ui-pagination id="ui-pag"></ui-pagination>

    <script>
    const pagination = document.getElementById('ui-pag');
    pagination.addEventListener('page-change', (event) => {
        
        const { id, page } = event.detail;
        
        console.log(`ID del componente: ${id}`);
        console.log(`Página solicitada: ${page}`);
        
    });
    </script>
    
    <div id="btn-nav">
        <ui-navigation-btn type="previous" id="id-atras"> Atras </ui-navigation-btn>
        <ui-navigation-btn type="next" id="id-adelante"> Continuar </ui-navigation-btn>
    </div>
    <script>
    const nav = document.getElementById('btn-nav');
    nav.addEventListener('click-navigation', (event) => {
        
        const { id, action } = event.detail;
        
        console.log(`ID del btn: ${id}`);
        console.log(`Action: ${action}`);
        
    });
    </script>

</body>
</html>
