<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="/src/components/ui-file-uploader.js"></script>

    <title>UASLP UI Kit - File Uploader</title>

    
</head>
<body>
    <a href="/">Volver a la lista</a>

    <h1>Componente File Uploader</h1>

 
    <ui-file-uploader 
        label="Arrastra y suelta tus archivos aquí o busca en tu equipo"
        helperText="Tamaño máximo por archivo: 5 MB"
        width ="550px"
        showBrowseButton
        sizeBrowseButton = "small"
        multiple
        accept="*"
        maxSize="5"
    ></ui-file-uploader>

    <ui-file-uploader 
        label="Arrastra y suelta tus archivos aquí o busca en tu equipo"
        helperText="Tamaño máximo por archivo: 5 MB"
        
        showBrowseButton
        multiple
        accept="*"
        maxSize="5"
        disabled
    ></ui-file-uploader>

    <ui-file-uploader 
        label="Arrastra y suelta tus archivos aquí"
        helperText="Solo de tipo PDF"
        width ="500px"
        multiple
        accept="*"
        maxSize="5"
        required
        showBrowseButton
    ></ui-file-uploader>

    <ui-file-uploader 
        label="Arrastra y suelta tus archivos aquí"
        helperText="Solo de tipo PDF"
        width ="450px"
        multiple
        accept="*"
        maxSize="5"
        warningMessage="unos archivos no se subieron"
        warningDescription="intenta otro"
        negativeMessage="no se subio el archivo"
        negativeDescription="intenta otro"
    ></ui-file-uploader>


   <ui-file-uploader 
id="obtencion-archivos"
        accept=".pdf"
        maxSize="5"
        multiple
        required
        label="Arrastra y suelta tus archivos aquí o busca en tu equipo"
        helperText="Tamaño máximo por archivo: 5 MB"
        width ="100%"
        multiple
        showBrowseButton
></ui-file-uploader>
<ui-button id="btn-procesar">Procesar Archivos</ui-button>

<script>
  const uploader = document.getElementById('obtencion-archivos');
  const boton = document.getElementById('btn-procesar');

  // La acción ocurre únicamente cuando el usuario decide procesar o enviar
  boton.addEventListener('click', () => {
    
    // 1. Acceso directo y agnóstico a la propiedad del componente
    const archivos = uploader.files;

    // 2. Imprime el arreglo de archivos nativos actualizados
    console.log('Arreglo de archivos:', archivos);

    // 3. Empaqueta en FormData
    const formData = new FormData();
    archivos.forEach((archivo) => {
      formData.append('archivos[]', archivo);
    });

    // 4. Imprime el contenido del FormData para verificarlo
    console.log('Contenido del FormData:');
    for (let [key, value] of formData.entries()) {
      console.log('Clave:', key, '| Valor:', value);
    }
  });
</script>


    </body>
</html>
